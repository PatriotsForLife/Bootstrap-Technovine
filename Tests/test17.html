<body>
  <!-- TICKET RQUEST FORM START -->
  <div class="container mt-5 mb-5" id="container-background">
	<h1 class="mb-4">Submit A Ticket</h1>
	<form action="https://formsubmit.co/email@gmail.com" method="POST">
		<div class="mb-3">
			<label for="Name" class="form-label">Full Name</label>
			<input type="text" class="form-control" placeholder="Your Full Name" name="name" aria-describedby="emailHelp" required>
		</div>
		<div class="mb-3">
			<label for="Email" class="form-label">Email Address</label>
			<input type="email" class="form-control" placeholder="Your Email Address" name="email" aria-describedby="emailHelp" required>
		</div>
		<div class="mb-3">
			<label for="Number" class="form-label">Phone Number</label>
			<input type="etel" class="form-control" placeholder="Your Phone Number" name="tel" aria-describedby="emailHelp" required>
		</div>
		<div class="mb-3">
			<label for="Message" class="form-label">Type of Work</label>
			<select class="form-select select-control" data-width="auto" aria-placeholder="" name="type of work" required>
				<option selected>Select A Category</option>
				<option class="select-control" value="1" name="type of work">CCTV / Alarm Systems</option>
				<option class="select-control" value="2">Desktop/Laptop</option>
				<option class="select-control" value="3">Fiber Cabling</option>
				<option class="select-control" value="4">General Tasks</option>
				<option class="select-control" value="5">Kiosk</option>
				<option class="select-control" value="6">Low Voltage Cabling</option>
				<option class="select-control" value="7">Networking</option>
				<option class="select-control" value="8">Point of Sale (POS)</option>
				<option class="select-control" value="9">Printer</option>
				<option class="select-control" value="10">Pro A/V, Digital Signage</option>
				<option class="select-control" value="11">Project management</option>
				<option class="select-control" value="12">Server Hardware/Software</option>
				<option class="select-control" value="13">Software Development</option>
				<option class="select-control" value="14">Structured Cabling</option>
				<option class="select-control" value="15">Telecom / VOIP</option>
				<option class="select-control" value="16">Other</option>
			  </select>
		</div>
		<div class="mb-3">
			<label for="Message" class="form-label">Description of the Problem</label>
			<textarea type="text" class="form-control" placeholder="Describe the problem clearly. (What is the problem, when the problem started, where did the problem begin, etc. )" name="problem description" required></textarea>
		</div>
		<div class="mb-3">
			<label for="Message" class="form-label">Required Materials/Equipment</label>
			<textarea type="text" class="form-control" placeholder="What equipment or materials are required to resolve the issue?" name="needed materials/equipment" required></textarea>
		</div>
		<input type="hidden" name="_next" value="">
		<!-- <input type="hidden" name="_captcha" value="false"> -->
		<input type="hidden" name="_subject" value="New Ticket Request Submission!">
		<button type="submit" class="btn btn-primary mb-3" id="submit-button">Submit</button>
		</form>
  </div>
  <!-- TICKET RQUEST FORM CLOSE -->
