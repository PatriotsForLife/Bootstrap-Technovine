  <body>
    <!-- CONTACT FORM SECTION START -->
	<section class="mb-5">
		<div class="form-area">
			<div class="container">
				<div class="row single-form g-0">
					<div class="col-sm-12 col-lg-6">
						<div class="left">
							<h2><span>Contact Us for</span> <br>Business Inquiries</h2>
							
							<div class="mt-5 text-white" id="info" >
							<i class="fa-solid fa-phone fa-2x ms-2"></i>
					
							<p class="ms-2"></p>
							</div>
							<div class="mt-5 text-white" id="info">
								<i class="fa-solid fa-envelope fa-2x ms-2"></i>
								<p class="ms-2"></p>
							</div>
							
						</div>
					</div>
					<div class="col-sm-12 col-lg-6">
						<div class="right">
						<i class="fa fa-caret-left"></i>
							<form action="https://formsubmit.co/myemail" method="POST">
							<div class="mb-3">
								<label for="Name" class="form-label">Full Name</label>
								<input type="text" class="form-control" placeholder="Your Full Name" aria-describedby="emailHelp" required>
							</div>
							<div class="mb-3">
								<label for="Email" class="form-label">Email Address</label>
								<input type="email" class="form-control" placeholder="Your Email" aria-describedby="emailHelp" required>
							</div>
							<div class="mb-3">
								<label for="Message" class="form-label">Message</label>
								<textarea type="password" class="form-control" placeholder="How can we help you?" required></textarea>
							</div>
							
							<input type="hidden" name="_subject" value="New Contact Form Inquiry!">
							<button type="submit" class="btn btn-primary">Submit</button>
							</form>
